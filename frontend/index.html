<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            background-color: #f8f1f5;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 330px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 26px;
            color: #444;
        }

        label {
            font-size: 15px;
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        .show-btn {
            font-size: 13px;
            cursor: pointer;
            color: #0077cc;
            float: right;
            margin-top: -12px;
            margin-bottom: 12px;
        }

        button {
            width: 100%;
            background-color: #1b8c74;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background-color: #166e5c;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username">

    <label>Password</label>
    <span class="show-btn" onclick="togglePassword()">Show</span>
    <input type="password" id="password" placeholder="Enter password">

    <button onclick="login()">Login</button>
</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

// ⭐ Inbuilt Login Details
const VALID_USER = "admin";
const VALID_PASS = "admin123";

function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (username === VALID_USER && password === VALID_PASS) {
        window.location.href = "billing.html";  // redirect to billing page
    } else {
        alert("Invalid username or password");
    }
}
</script>

</body>
</html>
