<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Billing System</title>

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left glass-card">

        <h3><i class="fa-solid fa-list"></i> Categories</h3>
        <div id="categorySection" class="category-box"></div>

        <h3><i class="fa-solid fa-layer-group"></i> Subcategories</h3>
        <div id="subCategorySection" class="subcategory-box"></div>

        <h3><i class="fa-solid fa-bowl-food"></i> Items</h3>
        <div id="itemSection" class="item-box"></div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right glass-card">

        <h3><i class="fa-solid fa-cart-shopping"></i> Cart</h3>

        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                    <th class="no-print">Remove</th>
                </tr>
            </thead>
            <tbody id="cartBody"></tbody>
        </table>

        <p id="subtotal">Subtotal: ₹0</p>
        <p id="tax">Tax (5%): ₹0</p>
        <p id="total">Total: ₹0</p>

        <h3><i class="fa-solid fa-user"></i> Customer Details</h3>
        <input type="text" id="custName" placeholder="Customer Name">
        <input type="text" id="custPhone" placeholder="Phone Number">

        <h3><i class="fa-solid fa-wallet"></i> Payment Mode</h3>
        <label><input type="radio" name="pay" value="Online" checked> Online</label>
        <label><input type="radio" name="pay" value="Offline"> Offline</label>

        <div class="bottom-buttons">
            <button id="newBill" onclick="newBill()">
                <i class="fa-solid fa-file"></i> New Bill
            </button>

            <button id="clearAll" onclick="clearAll()">
                <i class="fa-solid fa-trash"></i> Clear All
            </button>

            <button id="saveDraft" onclick="saveDraft()">
                <i class="fa-solid fa-save"></i> Save Draft
            </button>

            <button id="loadDraft" onclick="loadDraft()">
                <i class="fa-solid fa-folder-open"></i> Load Draft
            </button>

            <button id="printBill" onclick="window.print()">
                <i class="fa-solid fa-print"></i> Print
            </button>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
